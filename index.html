<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gallery - AI生成内容展示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: white; }
    .header { text-align: center; padding: 50px 20px; }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { opacity: 0.8; }
    .grid { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
    .card { background: white; border-radius: 20px; overflow: hidden; color: #333; transition: transform 0.3s; }
    .card:hover { transform: translateY(-10px); }
    .card-img { width: 100%; height: 200px; object-fit: cover; }
    .card-body { padding: 25px; }
    .card-body h2 { margin-bottom: 10px; }
    .card-body p { color: #666; margin-bottom: 15px; line-height: 1.6; }
    .btn { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; }
    .footer { text-align: center; padding: 40px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 AI Gallery</h1>
    <p>Powered by Nano Banana (Gemini 3.1 Flash Image Preview)</p>
  </div>
  <div class="grid">
    <div class="card">
      <img class="card-img" src="phonics-book/page1-cover.png" alt="Cat on a Mat">
      <div class="card-body">
        <h2>📚 Cat on a Mat</h2>
        <p>幼儿自然拼读绘本，教授短元音"a"发音。6页完整故事，可爱水彩风格插画。</p>
        <a class="btn" href="phonics-book/">阅读绘本 →</a>
      </div>
    </div>
    <div class="card">
      <img class="card-img" src="anatomy-atlas/brain.png" alt="Human Anatomy">
      <div class="card-body">
        <h2>🏥 人体解剖图谱</h2>
        <p>专业医学插图，Netter风格。包含大脑、心脏、神经元、骨骼、消化系统等6张详细解剖图。</p>
        <a class="btn" href="anatomy-atlas/">查看图谱 →</a>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>Made with ❤️ by 赛博话痨精 | 2026</p>
  </div>
</body>
</html>
